name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            build_whisper_from_source: true
            whisper_cmake_extra: >-
              -DCMAKE_INSTALL_PREFIX=/tmp/whisper-arm64
            whisper_install_prefix: /tmp/whisper-arm64
            cgo_cflags: -I/tmp/whisper-arm64/include
            cgo_ldflags: -L/tmp/whisper-arm64/lib
          - runner: macos-latest
            goos: darwin
            goarch: amd64
            build_whisper_from_source: true
            whisper_cmake_extra: >-
              -DCMAKE_OSX_ARCHITECTURES=x86_64
              -DGGML_NATIVE=OFF
              -DCMAKE_INSTALL_PREFIX=/tmp/whisper-amd64
            whisper_install_prefix: /tmp/whisper-amd64
            cgo_cflags: -I/tmp/whisper-amd64/include -target x86_64-apple-macos11
            cgo_ldflags: -L/tmp/whisper-amd64/lib -target x86_64-apple-macos11
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - runner: ubuntu-latest
            goos: linux
            goarch: arm64
            cc: aarch64-linux-gnu-gcc
            cxx: aarch64-linux-gnu-g++
            whisper_cmake_extra: >-
              -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc
              -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++
              -DCMAKE_SYSTEM_NAME=Linux
              -DCMAKE_SYSTEM_PROCESSOR=aarch64
              -DCMAKE_INSTALL_PREFIX=/tmp/whisper-arm64
            whisper_install_prefix: /tmp/whisper-arm64
            cgo_cflags: -I/tmp/whisper-arm64/include
            cgo_ldflags: -L/tmp/whisper-arm64/lib

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build whisper-cpp from source (macOS)
        if: matrix.goos == 'darwin'
        run: |
          git clone --depth 1 -b v1.8.4 https://github.com/ggml-org/whisper.cpp.git /tmp/whisper-src
          cmake -S /tmp/whisper-src -B /tmp/whisper-src/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            ${{ matrix.whisper_cmake_extra }} \
            -DWHISPER_BUILD_EXAMPLES=OFF \
            -DWHISPER_BUILD_TESTS=OFF
          cmake --build /tmp/whisper-src/build -j$(sysctl -n hw.ncpu)
          cmake --install /tmp/whisper-src/build

      - name: Install cross-compiler and cmake (Linux ARM64)
        if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu cmake

      - name: Build whisper-cpp from source (Linux AMD64)
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: |
          git clone --depth 1 -b v1.8.4 https://github.com/ggml-org/whisper.cpp.git /tmp/whisper-src
          cmake -S /tmp/whisper-src -B /tmp/whisper-src/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DWHISPER_BUILD_EXAMPLES=OFF \
            -DWHISPER_BUILD_TESTS=OFF \
            -DGGML_METAL=OFF \
            -DGGML_ACCELERATE=OFF
          cmake --build /tmp/whisper-src/build -j$(nproc)
          sudo cmake --install /tmp/whisper-src/build

      - name: Build whisper-cpp from source (Linux ARM64 cross-compile)
        if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
        run: |
          git clone --depth 1 -b v1.8.4 https://github.com/ggml-org/whisper.cpp.git /tmp/whisper-src
          cmake -S /tmp/whisper-src -B /tmp/whisper-src/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            ${{ matrix.whisper_cmake_extra }} \
            -DWHISPER_BUILD_EXAMPLES=OFF \
            -DWHISPER_BUILD_TESTS=OFF \
            -DGGML_METAL=OFF \
            -DGGML_ACCELERATE=OFF
          cmake --build /tmp/whisper-src/build -j$(nproc)
          cmake --install /tmp/whisper-src/build

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
          CGO_CFLAGS: ${{ matrix.cgo_cflags }}
          CGO_LDFLAGS: ${{ matrix.cgo_ldflags }}
        run: |
          go build -tags cgo_whisper -trimpath \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o orbitor-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: orbitor-${{ matrix.goos }}-${{ matrix.goarch }}
          path: orbitor-${{ matrix.goos }}-${{ matrix.goarch }}

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > mobile/android/app/google-services.json

      - name: Build release APK
        working-directory: mobile
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: orbitor-android
          path: mobile/build/app/outputs/flutter-apk/app-release.apk

  build-desktop:
    name: Build macOS Desktop App
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Import signing certificate
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          echo -n "$MACOS_CERTIFICATE" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Build desktop app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          SIGN_ARGS=""
          if [ -n "$APPLE_TEAM_ID" ]; then
            SIGN_ARGS="DEVELOPMENT_TEAM=$APPLE_TEAM_ID CODE_SIGN_IDENTITY=Developer\ ID\ Application"
          else
            SIGN_ARGS="CODE_SIGN_IDENTITY=- CODE_SIGNING_REQUIRED=NO"
          fi

          xcodebuild -project desktop/Orbitor/Orbitor.xcodeproj \
            -scheme Orbitor \
            -configuration Release \
            -derivedDataPath build \
            $SIGN_ARGS \
            -arch arm64 -arch x86_64 \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Notarize app
        if: env.APPLE_TEAM_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH="build/Build/Products/Release/Orbitor.app"

          # Create zip for notarization
          ditto -c -k --keepParent "$APP_PATH" Orbitor-notarize.zip

          xcrun notarytool submit Orbitor-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$APP_PATH"

      - name: Package app
        run: |
          APP_PATH="build/Build/Products/Release/Orbitor.app"
          ditto -c -k --keepParent "$APP_PATH" orbitor-desktop-macos.zip

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: orbitor-desktop-macos
          path: orbitor-desktop-macos.zip

  release:
    name: Create release
    needs: [build, build-android, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Rename APK
        run: mv dist/app-release.apk dist/orbitor-android.apk

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum orbitor-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/orbitor-*
            dist/checksums.txt
          generate_release_notes: true
          draft: false

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          # Extract SHA256s from checksums.txt
          SHA_DARWIN_ARM64=$(grep 'orbitor-darwin-arm64' dist/checksums.txt | awk '{print $1}')
          SHA_DARWIN_AMD64=$(grep 'orbitor-darwin-amd64' dist/checksums.txt | awk '{print $1}')
          SHA_LINUX_ARM64=$(grep 'orbitor-linux-arm64'  dist/checksums.txt | awk '{print $1}')
          SHA_LINUX_AMD64=$(grep 'orbitor-linux-amd64'  dist/checksums.txt | awk '{print $1}')
          SHA_DESKTOP_MACOS=$(grep 'orbitor-desktop-macos.zip' dist/checksums.txt | awk '{print $1}')

          # Strip leading 'v' from tag for the formula version field
          SEMVER="${VERSION#v}"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/will-osborne/homebrew-orbitor.git /tmp/tap

          sed \
            -e "s|version \".*\"|version \"${SEMVER}\"|" \
            -e "s|/releases/download/v[0-9][^/]*/orbitor-desktop|/releases/download/v${SEMVER}/orbitor-desktop|" \
            -e "s|PLACEHOLDER_DARWIN_ARM64_SHA256|${SHA_DARWIN_ARM64}|" \
            -e "s|PLACEHOLDER_DARWIN_AMD64_SHA256|${SHA_DARWIN_AMD64}|" \
            -e "s|PLACEHOLDER_LINUX_ARM64_SHA256|${SHA_LINUX_ARM64}|" \
            -e "s|PLACEHOLDER_LINUX_AMD64_SHA256|${SHA_LINUX_AMD64}|" \
            -e "s|PLACEHOLDER_DESKTOP_MACOS_SHA256|${SHA_DESKTOP_MACOS}|" \
            Formula/orbitor.rb > /tmp/tap/Formula/orbitor.rb

          cd /tmp/tap
          git add Formula/orbitor.rb
          git commit -m "orbitor ${VERSION}"
          git push
