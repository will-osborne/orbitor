name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: macos-latest   # ARM runner — native arm64
            goos: darwin
            goarch: arm64
          - runner: macos-13       # Intel runner — native amd64
            goos: darwin
            goarch: amd64
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - runner: ubuntu-latest
            goos: linux
            goarch: arm64
            cc: aarch64-linux-gnu-gcc

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install cross-compiler (Linux ARM64 only)
        if: matrix.cc != ''
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
        run: |
          go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o orbitor-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: orbitor-${{ matrix.goos }}-${{ matrix.goarch }}
          path: orbitor-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum orbitor-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/orbitor-*
            dist/checksums.txt
          generate_release_notes: true
          draft: false

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          # Extract SHA256s from checksums.txt
          SHA_DARWIN_ARM64=$(grep 'orbitor-darwin-arm64' dist/checksums.txt | awk '{print $1}')
          SHA_DARWIN_AMD64=$(grep 'orbitor-darwin-amd64' dist/checksums.txt | awk '{print $1}')
          SHA_LINUX_ARM64=$(grep 'orbitor-linux-arm64'  dist/checksums.txt | awk '{print $1}')
          SHA_LINUX_AMD64=$(grep 'orbitor-linux-amd64'  dist/checksums.txt | awk '{print $1}')

          # Strip leading 'v' from tag for the formula version field
          SEMVER="${VERSION#v}"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/will-osborne/homebrew-orbitor.git /tmp/tap

          sed \
            -e "s|version \".*\"|version \"${SEMVER}\"|" \
            -e "s|PLACEHOLDER_DARWIN_ARM64_SHA256|${SHA_DARWIN_ARM64}|" \
            -e "s|PLACEHOLDER_DARWIN_AMD64_SHA256|${SHA_DARWIN_AMD64}|" \
            -e "s|PLACEHOLDER_LINUX_ARM64_SHA256|${SHA_LINUX_ARM64}|" \
            -e "s|PLACEHOLDER_LINUX_AMD64_SHA256|${SHA_LINUX_AMD64}|" \
            Formula/orbitor.rb > /tmp/tap/Formula/orbitor.rb

          cd /tmp/tap
          git add Formula/orbitor.rb
          git commit -m "orbitor ${VERSION}"
          git push
